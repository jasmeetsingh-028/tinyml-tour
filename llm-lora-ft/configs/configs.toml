[sft]
output_dir = "./lora_out"
per_device_train_batch_size = 2
gradient_accumulation_steps = 4
num_train_epochs = 10
learning_rate = 2e-4
logging_steps = 5
save_strategy = "no"
report_to = []

[lora]
r = 16
lora_alpha = 32
lora_dropout = 0.05
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]
task_type = "CAUSAL_LM"
